<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tibbiy Skaner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; line-height: 1.6; }
        .healthy { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 Tibbiy Ko'rik Skaneri</h2>
    
    <div class="input-group">
        <label>Tana harorati (°C):</label>
        <input type="number" id="temp" step="0.1" placeholder="Masalan: 36.6">
    </div>

    <div class="input-group">
        <label>Yurak urishi (puls/min):</label>
        <input type="number" id="pulse" placeholder="Masalan: 75">
    </div>

    <div class="input-group">
        <label>Yuqori qon bosimi (Systolic):</label>
        <input type="number" id="blood_up" placeholder="Masalan: 120">
    </div>

    <button onclick="startCheck()">Skanerlashni boshlash</button>

    <div id="result"></div>
</div>

<script>
    function startCheck() {
        const temp = parseFloat(document.getElementById('temp').value);
        const pulse = parseInt(document.getElementById('pulse').value);
        const b_up = parseInt(document.getElementById('blood_up').value);
        const resultDiv = document.getElementById('result');

        if (!temp || !pulse || !b_up) {
            alert("Iltimos, barcha maydonlarni to'ldiring!");
            return;
        }

        let status = "healthy";
        let message = "<b>Natija:</b><br>";

        // Tana harorati tahlili
        if (temp >= 36.0 && temp <= 37.2) {
            message += "✅ Harorat normal.<br>";
        } else {
            status = "warning";
            message += "⚠️ Harorat me'yorda emas!<br>";
        }

        // Puls tahlili
        if (pulse >= 60 && pulse <= 100) {
            message += "✅ Puls barqaror.<br>";
        } else {
            status = "warning";
            message += "⚠️ Puls notinch!<br>";
        }

        // Qon bosimi tahlili
        if (b_up >= 110 && b_up <= 130) {
            message += "✅ Qon bosimi ideal.<br>";
        } else if (b_up > 140) {
            status = "danger";
            message += "🚨 Diqqat! Qon bosimi yuqori!<br>";
        } else {
            status = "warning";
            message += "⚠️ Qon bosimi me'yordan tashqari.<br>";
        }

        // Yakuniy xulosa
        if (status === "healthy") {
            message += "<br><b>Siz sog'lomsiz!</b>";
        } else if (status === "warning") {
            message += "<br><b>Sog'lig'ingizga e'tiborli bo'ling.</b>";
        } else {
            message += "<br><b>Zudlik bilan shifokorga murojaat qiling!</b>";
        }

        resultDiv.className = status;
        resultDiv.innerHTML = message;
        resultDiv.style.display = "block";
    }
</script>

</body>
</html>
