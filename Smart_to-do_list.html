<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Rejalarim - Foydali Ilova</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button#addBtn { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button#addBtn:hover { background: #357abd; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-text { flex: 1; cursor: pointer; color: #444; }
        .completed .task-text { text-decoration: line-through; color: #888; }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; margin-left: 10px; padding: 5px; }
        .stats { margin-top: 20px; font-size: 14px; color: #666; border-top: 1px solid #eee; pt: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Kunlik Rejalarim</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Yangi vazifa kiriting...">
        <button id="addBtn">Qo'shish</button>
    </div>
    <ul id="taskList"></ul>
    <div class="stats" id="stats">Jami vazifalar: 0</div>
</div>

<script>
    const input = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const stats = document.getElementById('stats');

    let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

    function saveAndRender() {
        localStorage.setItem('myTasks', JSON.stringify(tasks));
        renderTasks();
    }

    function renderTasks() {
        taskList.innerHTML = '';
        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            if (task.completed) li.classList.add('completed');
            
            li.innerHTML = `
                <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                <span class="delete-btn" onclick="deleteTask(${index})">✕</span>
            `;
            taskList.appendChild(li);
        });
        stats.innerText = `Jami vazifalar: ${tasks.length} | Bajarildi: ${tasks.filter(t => t.completed).length}`;
    }

    addBtn.onclick = () => {
        if (input.value.trim() === '') return;
        tasks.push({ text: input.value, completed: false });
        input.value = '';
        saveAndRender();
    };

    input.onkeypress = (e) => { if (e.key === 'Enter') addBtn.onclick(); };

    window.toggleTask = (index) => {
        tasks[index].completed = !tasks[index].completed;
        saveAndRender();
    };

    window.deleteTask = (index) => {
        tasks.splice(index, 1);
        saveAndRender();
    };

    renderTasks();
</script>

</body>
</html>
